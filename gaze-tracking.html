<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Eye Gym - Iris Gaze Demo</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; width: 100vw; height: 100vh; font-family: sans-serif; background: #0a0a1a; color: white; }
      .screen { display: none; width: 100vw; height: 100vh; }
      .screen.active { display: flex; }

      #screen-start {
        flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      }
      #screen-start h1 { font-size: 28px; font-weight: 600; }
      #screen-start p { font-size: 14px; color: rgba(255,255,255,0.5); text-align: center; line-height: 1.8; }

      #screen-calib { position: relative; flex-direction: column; align-items: center; justify-content: center; }
      #calib-instruction {
        position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
        font-size: 14px; color: rgba(255,255,255,0.8);
        background: rgba(0,0,0,0.6); padding: 10px 24px; border-radius: 20px; z-index: 10;
      }
      #calib-progress {
        position: fixed; top: 68px; left: 50%; transform: translateX(-50%);
        font-size: 13px; color: rgba(255,255,255,0.4); z-index: 10;
      }
      .calib-dot {
        position: fixed; width: 28px; height: 28px; border-radius: 50%;
        background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
        transform: translate(-50%, -50%); cursor: pointer; z-index: 10;
        transition: all 0.2s;
      }
      .calib-dot.active {
        background: #4af; border-color: #4af;
        transform: translate(-50%, -50%) scale(1.4);
        box-shadow: 0 0 20px rgba(68,170,255,0.7);
        animation: calib-pulse 0.8s infinite alternate;
      }
      .calib-dot.done { background: rgba(68,170,255,0.2); border-color: rgba(68,170,255,0.2); }
      @keyframes calib-pulse {
        from { box-shadow: 0 0 10px rgba(68,170,255,0.5); }
        to   { box-shadow: 0 0 25px rgba(68,170,255,0.9); }
      }
      #calib-countdown {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
        font-size: 48px; font-weight: 600; color: rgba(255,255,255,0.15); z-index: 5;
        pointer-events: none;
      }

      #screen-main { position: relative; }
      #three-canvas { position: absolute; inset: 0; z-index: 0; }

      #gaze-dot {
        position: fixed; width: 20px; height: 20px;
        background: rgba(255,80,80,0.85); border-radius: 50%;
        pointer-events: none; transform: translate(-50%, -50%);
        z-index: 999; box-shadow: 0 0 12px rgba(255,80,80,0.6);
        transition: left 0.04s, top 0.04s;
      }
      #pupil-dot {
        position: fixed; width: 10px; height: 10px;
        background: rgba(255,220,0,0.9); border-radius: 50%;
        pointer-events: none; transform: translate(-50%, -50%);
        z-index: 998; box-shadow: 0 0 8px rgba(255,220,0,0.5);
        display: none;
      }

      #stats {
        position: fixed; top: 20px; left: 20px;
        background: rgba(0,0,0,0.65); border: 1px solid rgba(255,255,255,0.12);
        border-radius: 12px; padding: 16px 20px;
        font-size: 13px; line-height: 1.9; z-index: 99; min-width: 190px;
      }
      .label { color: rgba(255,255,255,0.4); font-size: 11px; }
      .value { font-size: 18px; font-weight: 600; }
      .good { color: #4af; } .warn { color: #fa4; } .bad { color: #f55; }

      #iris-debug {
        position: fixed; bottom: 80px; left: 20px;
        background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08);
        border-radius: 10px; padding: 10px 14px;
        font-size: 11px; color: rgba(255,255,255,0.5);
        line-height: 1.8; z-index: 99; font-family: monospace;
      }

      #webcam-wrap {
        position: fixed; bottom: 20px; right: 20px;
        border-radius: 12px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.2); z-index: 99;
      }
      #webcam { width: 200px; height: 150px; transform: scaleX(-1); display: block; }

      #hint {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        font-size: 12px; color: rgba(255,255,255,0.3); z-index: 99;
      }
      #recalib-btn {
        position: fixed; top: 20px; right: 20px; z-index: 99;
        padding: 8px 18px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.5); color: white; cursor: pointer; font-size: 13px;
      }
      #home-btn {
        position: fixed; top: 20px; right: 150px; z-index: 99;
        padding: 8px 18px; border-radius: 8px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(0,0,0,0.5); color: white; cursor: pointer; font-size: 13px;
        text-decoration: none;
      }
      .btn {
        padding: 12px 32px; border-radius: 10px;
        border: 1px solid rgba(255,255,255,0.2);
        background: rgba(255,255,255,0.08); color: white; font-size: 15px; cursor: pointer;
      }
      .btn-primary { background: #4af; color: #0a0a1a; border-color: #4af; font-weight: 600; }
      .btn-primary:hover { background: #6bf; }
    </style>
  </head>
  <body>

    <div class="screen active" id="screen-start">
      <h1>👁 Eye Gym</h1>
      <p>Iris 기반 시선 추적 데모입니다.<br>캘리브레이션 9포인트 후 시선 추적이 시작됩니다.</p>
      <button class="btn btn-primary" onclick="startCalib()">캘리브레이션 시작</button>
    </div>

    <div class="screen" id="screen-calib">
      <div id="calib-instruction">파란 점을 바라보면서 클릭하세요</div>
      <div id="calib-progress">0 / 9 완료</div>
      <div id="calib-countdown"></div>
    </div>

    <div class="screen" id="screen-main">
      <canvas id="three-canvas"></canvas>
      <div id="gaze-dot"></div>
      <div id="pupil-dot"></div>

<div id="stats">
  <div class="label">눈 개방도 (좌)</div>
  <div class="value" id="ear-left">—</div>
  <div class="label" style="margin-top:6px;">눈 개방도 (우)</div>
  <div class="value" id="ear-right">—</div>
  <div class="label" style="margin-top:6px;">깜빡임</div>
  <div class="value" id="blink-val">0 회</div>
  <div class="label" style="margin-top:6px;">불완전 깜빡임</div>
  <div class="value" id="incomplete-val">0 회</div>
  <div class="label" style="margin-top:6px;">상태</div>
  <div class="value" id="status-val">감지 중...</div>
</div>

      <div id="iris-debug">
        <div>iris L: <span id="iris-l">—</span></div>
        <div>iris R: <span id="iris-r">—</span></div>
        <div>gaze raw: <span id="gaze-raw">—</span></div>
      </div>

      <div id="webcam-wrap">
        <video id="webcam" autoplay playsinline></video>
      </div>
      <div id="hint">빨간 점 = 시선 추적 (iris 기반) &nbsp;|&nbsp; 파란 구 = 원거리 타겟</div>
      <button id="recalib-btn" onclick="startCalib()">재캘리브레이션</button>
      <a id="home-btn" href="index.html">← 메인</a>
    </div>

    <script>
      // ── 화면 전환 ──
      function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'screen-main') initThree();
      }

      // ── 캘리브레이션 데이터 ──
      // 각 포인트: { screenX, screenY, irisLX, irisLY, irisRX, irisRY }
      let calibData = [];
      let calibIndex = 0;
      let calibDots = [];
      let currentIris = { lx:0, ly:0, rx:0, ry:0 };

      // 캘리브레이션 포인트 9개
      const CALIB_POINTS = [
        [0.05,0.05],[0.5,0.05],[0.95,0.05],
        [0.05,0.5], [0.5,0.5], [0.95,0.5],
        [0.05,0.95],[0.5,0.95],[0.95,0.95]
      ];

      // Linear regression 계수
      let regCoeff = null;

      function startCalib() {
        calibData = [];
        calibIndex = 0;
        showScreen('screen-calib');
        calibDots.forEach(d => d.remove());
        calibDots = [];
        const calib = document.getElementById('screen-calib');
        CALIB_POINTS.forEach((pos, i) => {
          const dot = document.createElement('div');
          dot.className = 'calib-dot';
          dot.style.left = (pos[0]*100)+'vw';
          dot.style.top = (pos[1]*100)+'vh';
          dot.onclick = () => handleCalibClick(i, pos, dot);
          calib.appendChild(dot);
          calibDots.push(dot);
        });
        activateCalibDot(0);
      }

      function activateCalibDot(i) {
        calibDots.forEach(d => d.classList.remove('active'));
        if (calibDots[i]) calibDots[i].classList.add('active');
        document.getElementById('calib-progress').textContent = i + ' / 9 완료';
      }

      function handleCalibClick(i, pos, dot) {
        if (i !== calibIndex) return;
        // 현재 iris 좌표 수집
        calibData.push({
          sx: pos[0] * window.innerWidth,
          sy: pos[1] * window.innerHeight,
          lx: currentIris.lx, ly: currentIris.ly,
          rx: currentIris.rx, ry: currentIris.ry
        });
        dot.classList.remove('active');
        dot.classList.add('done');
        calibIndex++;
        document.getElementById('calib-progress').textContent = calibIndex + ' / 9 완료';
        if (calibIndex < 9) {
          activateCalibDot(calibIndex);
        } else {
          fitRegression();
          setTimeout(() => showScreen('screen-main'), 400);
        }
      }

      // ── Linear Regression (iris → screen 좌표) ──
      // 입력: [irisLX, irisLY, irisRX, irisRY, 1]
      // 출력: [screenX, screenY]
      function fitRegression() {
        if (calibData.length < 4) return;
        // X 행렬 (N x 5), Y 행렬 (N x 2)
        const N = calibData.length;
        const X = calibData.map(d => [d.lx, d.ly, d.rx, d.ry, 1]);
        const Yx = calibData.map(d => d.sx);
        const Yy = calibData.map(d => d.sy);
        regCoeff = {
          x: lstSq(X, Yx),
          y: lstSq(X, Yy)
        };
      }

      // 최소제곱법 (Normal equation: β = (XᵀX)⁻¹Xᵀy)
      function lstSq(X, y) {
        const n = X.length, m = X[0].length;
        // XᵀX
        const XtX = Array.from({length:m},()=>Array(m).fill(0));
        for(let i=0;i<m;i++) for(let j=0;j<m;j++)
          for(let k=0;k<n;k++) XtX[i][j]+=X[k][i]*X[k][j];
        // Xᵀy
        const Xty = Array(m).fill(0);
        for(let i=0;i<m;i++) for(let k=0;k<n;k++) Xty[i]+=X[k][i]*y[k];
        // (XᵀX)⁻¹ — 가우스 소거법
        return gaussSolve(XtX, Xty);
      }

      function gaussSolve(A, b) {
        const n = b.length;
        const M = A.map((r,i)=>[...r, b[i]]);
        for(let col=0;col<n;col++){
          let pivot=col;
          for(let row=col+1;row<n;row++) if(Math.abs(M[row][col])>Math.abs(M[pivot][col])) pivot=row;
          [M[col],M[pivot]]=[M[pivot],M[col]];
          if(Math.abs(M[col][col])<1e-10) continue;
          for(let row=0;row<n;row++){
            if(row===col) continue;
            const f=M[row][col]/M[col][col];
            for(let j=col;j<=n;j++) M[row][j]-=f*M[col][j];
          }
        }
        return M.map((r,i)=>r[n]/r[i]);
      }

      function predictGaze(lx,ly,rx,ry){
        if(!regCoeff) return null;
        const feat=[lx,ly,rx,ry,1];
        const px=regCoeff.x.reduce((s,c,i)=>s+c*feat[i],0);
        const py=regCoeff.y.reduce((s,c,i)=>s+c*feat[i],0);
        return {x:px, y:py};
      }

      // ── 스무딩 (이동 평균) ──
      const gazeHistory = [];
      const SMOOTH_N = 6;
      function smoothGaze(x, y) {
        gazeHistory.push({x,y});
        if (gazeHistory.length > SMOOTH_N) gazeHistory.shift();
        const sx = gazeHistory.reduce((s,p)=>s+p.x,0)/gazeHistory.length;
        const sy = gazeHistory.reduce((s,p)=>s+p.y,0)/gazeHistory.length;
        return {x:sx, y:sy};
      }

      // ── Three.js ──
      let threeInit = false;
      function initThree() {
        if (threeInit) return;
        threeInit = true;
        const canvas = document.getElementById('three-canvas');
        const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setClearColor(0x0a0a1a);
        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x0a0a1a, 10, 40);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0,1.6,0);

        // 바닥 격자
        const floorGeo = new THREE.PlaneGeometry(40,40,20,20);
        const floorMat = new THREE.MeshBasicMaterial({color:0x0d0d22,wireframe:true,opacity:0.25,transparent:true});
        const floor = new THREE.Mesh(floorGeo,floorMat);
        floor.rotation.x=-Math.PI/2; floor.position.y=-1.5;
        scene.add(floor);

        // 원거리 타겟
        const target = new THREE.Mesh(
          new THREE.SphereGeometry(0.25,32,32),
          new THREE.MeshBasicMaterial({color:0x44aaff})
        );
        target.position.set(0,1.6,-15);
        scene.add(target);

        // 링들
        [4,8,12].forEach((z,i)=>{
          const ring = new THREE.Mesh(
            new THREE.TorusGeometry(1.5-i*0.3,0.012,8,60),
            new THREE.MeshBasicMaterial({color:0x334466,opacity:0.35-i*0.08,transparent:true})
          );
          ring.position.set(0,1.6,-z);
          scene.add(ring);
        });

        // 중앙 고정점
        const center = new THREE.Mesh(
          new THREE.SphereGeometry(0.04,16,16),
          new THREE.MeshBasicMaterial({color:0xffffff})
        );
        center.position.set(0,1.6,-2.5);
        scene.add(center);

        // 파티클
        const pGeo = new THREE.BufferGeometry();
        const pos = [];
        for(let i=0;i<300;i++)
          pos.push((Math.random()-0.5)*30,(Math.random()-0.5)*10+1.6,-Math.random()*30-2);
        pGeo.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
        scene.add(new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x223344,size:0.05})));

        let t=0;
        function animate(){
          requestAnimationFrame(animate);
          t+=0.01;
          target.scale.setScalar(1+Math.sin(t)*0.08);
          renderer.render(scene,camera);
        }
        animate();

        window.addEventListener('resize',()=>{
          camera.aspect=window.innerWidth/window.innerHeight;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth,window.innerHeight);
        });
      }

      // ── MediaPipe FaceMesh ──
      const videoEl = document.getElementById('webcam');
      const gazeDot = document.getElementById('gaze-dot');

      // Iris 랜드마크 인덱스
      const LEFT_IRIS  = [474,475,476,477,473]; // 473 = 중심
      const RIGHT_IRIS = [469,470,471,472,468]; // 468 = 중심
      const LEFT_EYE   = [362,385,387,263,373,380];
      const RIGHT_EYE  = [33,160,158,133,153,144];

      let blinkCount=0, incompleteCount=0, isBlinking=false, minEAR=1;
      const EAR_THRESHOLD=0.2, INCOMPLETE_THRESHOLD=0.15;

      function dist(a,b){ return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }
      function calcEAR(lm,idx){
        const p=idx.map(i=>lm[i]);
        return (dist(p[1],p[5])+dist(p[2],p[4]))/(2*dist(p[0],p[3]));
      }

      // Iris 중심 계산 (5개 점 평균)
      function irisCenter(lm, indices) {
        const pts = indices.map(i=>lm[i]);
        return {
          x: pts.reduce((s,p)=>s+p.x,0)/pts.length,
          y: pts.reduce((s,p)=>s+p.y,0)/pts.length
        };
      }

      const faceMesh = new FaceMesh({
        locateFile: f=>`https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${f}`
      });
      faceMesh.setOptions({
        maxNumFaces:1, refineLandmarks:true,
        minDetectionConfidence:0.5, minTrackingConfidence:0.5
      });

      faceMesh.onResults(results => {
        if(!results.multiFaceLandmarks?.length){
          document.getElementById('status-val').textContent='얼굴 없음';
          return;
        }
        const lm = results.multiFaceLandmarks[0];

        // EAR & Blink
        const ear = (calcEAR(lm,LEFT_EYE)+calcEAR(lm,RIGHT_EYE))/2;
        
        const earL = calcEAR(lm, LEFT_EYE);
const earR = calcEAR(lm, RIGHT_EYE);
document.getElementById('ear-left').textContent = earL.toFixed(3);
document.getElementById('ear-right').textContent = earR.toFixed(3);

        const s = document.getElementById('status-val');
        if(ear>0.25){s.textContent='눈 뜸 ✓';s.className='value good';}
        else if(ear>INCOMPLETE_THRESHOLD){s.textContent='불완전 깜빡임';s.className='value warn';}
        else{s.textContent='눈 감음';s.className='value bad';}
        if(ear<EAR_THRESHOLD&&!isBlinking){isBlinking=true;minEAR=ear;}
        else if(ear<EAR_THRESHOLD){minEAR=Math.min(minEAR,ear);}
        else if(ear>=EAR_THRESHOLD&&isBlinking){
          isBlinking=false;blinkCount++;
          if(minEAR>INCOMPLETE_THRESHOLD)incompleteCount++;
          document.getElementById('blink-val').textContent=blinkCount+' 회';
          document.getElementById('incomplete-val').textContent=incompleteCount+' 회';
          minEAR=1;
        }

        // Iris 중심
        const iL = irisCenter(lm, LEFT_IRIS);
        const iR = irisCenter(lm, RIGHT_IRIS);
        currentIris = { lx:iL.x, ly:iL.y, rx:iR.x, ry:iR.y };

        document.getElementById('iris-l').textContent = `${iL.x.toFixed(3)}, ${iL.y.toFixed(3)}`;
        document.getElementById('iris-r').textContent = `${iR.x.toFixed(3)}, ${iR.y.toFixed(3)}`;

        // Gaze 예측
        const pred = predictGaze(iL.x, iL.y, iR.x, iR.y);
        if(pred){
          const smoothed = smoothGaze(pred.x, pred.y);
          gazeDot.style.left = smoothed.x+'px';
          gazeDot.style.top  = smoothed.y+'px';
          document.getElementById('gaze-raw').textContent =
            `${Math.round(smoothed.x)}, ${Math.round(smoothed.y)}`;
        }
      });

      const cam = new Camera(videoEl, {
        onFrame: async()=>{ await faceMesh.send({image:videoEl}); },
        width:320, height:240
      });
      cam.start();
    </script>
  </body>
</html>
